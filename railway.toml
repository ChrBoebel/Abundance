[build]
builder = "NIXPACKS"

[deploy]
startCommand = "pip install -e . && pip install -r flask_frontend/requirements.txt && cd flask_frontend && gunicorn -k gthread -w 2 --threads 4 --timeout 0 --keep-alive 120 -b 0.0.0.0:$PORT app:app"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
