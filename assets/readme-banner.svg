<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Abundance README banner</title>
  <desc id="desc">A branded banner for the Abundance deep research application.</desc>
  <defs>
