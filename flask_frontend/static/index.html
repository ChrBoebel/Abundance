<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abundance - Deep Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        primary: 'hsl(var(--primary))',
                        muted: 'hsl(var(--muted))',
                        border: 'hsl(var(--border))',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="border-b" style="border-color: hsl(var(--border)); background: hsl(var(--card));">
        <div class="flex items-center justify-between p-4 max-w-6xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center p-0 overflow-visible" style="background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(var(--primary) / 0.8) 100%); box-shadow: 0 4px 20px hsl(var(--primary) / 0.4), 0 0 40px hsl(var(--primary) / 0.2);">
                    <img src="/bergbild2.svg" alt="Abundance Logo" class="w-[180%] h-[180%]" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
                </div>
                <h1 class="text-2xl font-bold">Abundance</h1>
            </div>
            <div class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-green-500 rounded-full" title="Verbunden"></div>
                <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path>
                        <path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path>
                        <path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path>
                        <path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path>
                        <path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <div class="flex-1 overflow-hidden max-w-6xl mx-auto w-full">
        <div id="messages" class="h-full overflow-y-auto p-4 space-y-4">
            <!-- Welcome Message -->
            <div id="welcome" class="flex items-center justify-center h-full">
                <div class="text-center space-y-4 max-w-md">
                    <div class="w-16 h-16 rounded-2xl mx-auto flex items-center justify-center p-0 overflow-visible" style="background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(var(--primary) / 0.8) 100%); box-shadow: 0 8px 32px hsl(var(--primary) / 0.4), 0 0 60px hsl(var(--primary) / 0.2);">
                        <img src="/bergbild2.svg" alt="Abundance Logo" class="w-[180%] h-[180%]" style="filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));">
                    </div>
                    <h2 class="text-xl font-semibold">Abundance</h2>
                    <p class="text-sm" style="color: hsl(var(--foreground) / 0.7);">
                        Erkunde die Fülle des Wissens: Stelle eine Frage und erhalte fundierte Antworten aus vielfältigen Perspektiven.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="border-t p-4 max-w-6xl mx-auto w-full" style="border-color: hsl(var(--border)); background: hsl(var(--background));">
        <form id="chat-form" class="flex gap-2">
            <input
                type="text"
                id="message-input"
                placeholder="Frage nach Themen, Quellen, Analysen..."
                class="flex-1 px-4 py-2 rounded-lg border focus:outline-none focus:ring-2 transition"
                style="background: hsl(var(--card)); border-color: hsl(var(--border)); color: hsl(var(--foreground));"
            />
            <button
                type="submit"
                id="send-btn"
                class="px-6 py-2 rounded-lg font-medium transition hover:scale-105 active:scale-95 flex items-center gap-2"
                style="background: hsl(var(--primary)); color: white;"
            >
                <i data-lucide="send" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Senden</span>
            </button>
        </form>
    </div>

    <script src="/js/app.js" defer></script>
</body>
</html>
