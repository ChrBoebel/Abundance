<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abundia - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        primary: 'hsl(var(--primary))',
                        muted: 'hsl(var(--muted))',
                        border: 'hsl(var(--border))',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 rounded-2xl shadow-2xl" style="background: hsl(var(--card)); border: 1px solid hsl(var(--border));">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg"
                 style="background: hsl(var(--primary));">
                <i data-lucide="book-open" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">Abundia</h1>
            <p class="text-sm opacity-70">Passwort eingeben um fortzufahren</p>
        </div>

        <form method="POST" action="/login" class="space-y-6">
            {% if error %}
            <div class="p-4 rounded-lg flex items-center gap-3" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
                <span class="text-red-400 text-sm font-medium">{{ error }}</span>
            </div>
            {% endif %}

            <div class="space-y-2">
                <label for="password" class="block text-sm font-medium opacity-80">Passwort</label>
                <div class="relative">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Passwort eingeben..."
                        required
                        autofocus
                        class="w-full px-4 py-3 pr-12 rounded-lg border focus:outline-none focus:ring-2 transition"
                        style="background: hsl(var(--background)); border-color: hsl(var(--border)); color: hsl(var(--foreground));"
                    />
                    <button
                        type="button"
                        id="toggle-password"
                        class="absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded hover:bg-gray-700 transition"
                        onclick="togglePassword()"
                    >
                        <i data-lucide="eye" id="eye-icon" class="w-5 h-5 opacity-50"></i>
                        <i data-lucide="eye-off" id="eye-off-icon" class="w-5 h-5 opacity-50 hidden"></i>
                    </button>
                </div>
            </div>

            <button
                type="submit"
                class="w-full px-6 py-3 rounded-lg font-semibold transition hover:scale-105 active:scale-95 flex items-center justify-center gap-2 shadow-lg"
                style="background: hsl(var(--primary)); color: white;">
                <i data-lucide="unlock" class="w-5 h-5"></i>
                Anmelden
            </button>
        </form>

        <div class="mt-8 pt-6 border-t" style="border-color: hsl(var(--border));">
            <div class="flex items-center justify-center gap-2 text-xs opacity-60">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                <span>Geschützt durch Passwort-Authentifizierung</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }

            lucide.createIcons();
        }

        // Auto-focus on password field
        document.getElementById('password').focus();
    </script>
</body>
</html>
