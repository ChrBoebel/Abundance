[phases.setup]
nixPkgs = ["nodejs_18", "python311", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = [
  "npm ci",
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install -e ."
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && npx next start -p $PORT"
