[phases.setup]
nixPkgs = ["nodejs_18", "python311", "python311Packages.pip", "python311Packages.virtualenv"]
nixLibs = ["stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "npm ci",
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip setuptools wheel",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/pip install -e . --no-deps"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx next start -p $PORT"

[variables]
PYTHON_CMD = "/opt/venv/bin/python"
PYTHONPATH = "/app:/app/src"
